# Redirect all HTTP traffic to the canonical HTTPS host.
# A literal host (not $host) is used so a forged Host header cannot be
# reflected into the redirect target.
server {
    listen 80;
    server_name hebrai.co www.hebrai.co;
    return 301 https://hebrai.co$request_uri;
}

# HTTPS — TLS termination + proxy to Next.js
server {
    listen 443 ssl;
    http2 on;
    server_name hebrai.co www.hebrai.co;

    ssl_certificate     /etc/letsencrypt/live/hebrai.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hebrai.co/privkey.pem;

    # Mozilla "intermediate" profile: TLS 1.2+ with modern AEAD ciphers only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Force HTTPS for a year, including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Resolve the upstream at request time via Docker's embedded DNS instead of
    # at config-parse time. This lets `nginx -t` validate the config without the
    # `next` container running (so the deploy gate works on a first deploy), and
    # lets nginx pick up a restarted `next` without a reload.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream_next next:3000;

    location / {
        proxy_pass http://$upstream_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
